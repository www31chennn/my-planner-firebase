<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="計畫本" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.png" />
  <link rel="icon" type="image/png" href="/icon.png" />
  <title>計畫本</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    // Service Worker 註冊
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").then(reg => {
          window._SW_REG = reg;
          console.log("SW 已註冊");
        }).catch(err => {
          console.log("SW 註冊失敗:", err);
        });
      });
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" defer></script>
  <script src="/commons.js" defer></script>
  <script src="/planner.js" defer></script>
  <script src="/subscriptions.js" defer></script>
  <script src="/weight.js" defer></script>
  <script src="/budget.js" defer></script>
  <script src="/countdown.js" defer></script>
  <script src="/electricity.js" defer></script>
  <script src="/kicks.js" defer></script>
  <script src="/app.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; }
    body { background: #F7F5F2; overscroll-behavior: none; font-family: 'Noto Sans TC', sans-serif; }
    input, textarea, button, select { font-family: inherit; }
    ::-webkit-scrollbar { display: none; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes popIn { from { opacity:0; transform:scale(0.88); } to { opacity:1; transform:scale(1); } }
    .fade-up { animation: fadeUp 0.3s ease forwards; }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    .pop-in { animation: popIn 0.18s ease forwards; }
    .menu-overlay { position:fixed; inset:0; z-index:200; display:flex; }
    .menu-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.3); }
    .menu-panel { position:relative; width:260px; background:#fff; height:100%; display:flex; flex-direction:column; box-shadow:4px 0 20px rgba(0,0,0,0.1); animation:slideIn 0.25s ease; }
    @keyframes slideIn { from { transform:translateX(-100%); } to { transform:translateX(0); } }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
<div id="root"></div>
</body>
</html>
